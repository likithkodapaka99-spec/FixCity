<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Staff sign in — FixCity</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/css/tailwind-overrides.css" />
  </head>
  <body class="min-h-screen bg-slate-950 text-slate-100 antialiased">
    <div class="mx-auto flex min-h-screen max-w-md flex-col justify-center px-4 py-12">
      <a href="/" class="mb-8 flex items-center gap-2">
        <span class="inline-flex h-10 w-10 items-center justify-center rounded-xl bg-indigo-600 text-lg font-black text-white">F</span>
        <span class="text-xl font-extrabold text-white">FixCity</span>
      </a>
      <div class="rounded-2xl border border-slate-800 bg-slate-900/60 p-6 shadow-xl">
        <h1 class="text-lg font-bold text-white">Municipality staff</h1>
        <p class="mt-1 text-sm text-slate-400">Sign in with your authorized account to manage reports.</p>
        <form id="form-auth" class="mt-6 space-y-4">
          <div>
            <label class="block text-xs font-semibold text-slate-400" for="email">Email</label>
            <input id="email" name="email" type="email" autocomplete="username" required class="mt-1 w-full rounded-xl border border-slate-700 bg-slate-950 px-3 py-2 text-sm text-white" />
          </div>
          <div>
            <label class="block text-xs font-semibold text-slate-400" for="password">Password</label>
            <input id="password" name="password" type="password" autocomplete="current-password" required class="mt-1 w-full rounded-xl border border-slate-700 bg-slate-950 px-3 py-2 text-sm text-white" />
          </div>
          <p id="form-err" class="hidden text-sm text-rose-400"></p>
          <button type="submit" class="w-full rounded-xl bg-indigo-600 py-2.5 text-sm font-semibold text-white hover:bg-indigo-500">Sign in</button>
        </form>
        <p class="mt-4 text-center text-xs text-slate-500">
          <a class="text-indigo-400 hover:underline" href="/">Back to FixCity</a>
        </p>
      </div>
    </div>
    <script>
      document.getElementById("form-auth").addEventListener("submit", async function (e) {
        e.preventDefault();
        var err = document.getElementById("form-err");
        err.classList.add("hidden");
        var email = document.getElementById("email").value.trim();
        var password = document.getElementById("password").value;
        try {
          var res = await fetch("/api/auth/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            credentials: "same-origin",
            body: JSON.stringify({ email: email, password: password }),
          });
          var data = await res.json().catch(function () { return {}; });
          if (!res.ok) {
            err.textContent = data.error || "Sign in failed.";
            err.classList.remove("hidden");
            return;
          }
          if (data.user && data.user.role !== "authority") {
            await fetch("/api/auth/logout", { method: "POST", credentials: "same-origin" });
            err.textContent = "This account is not authorized for municipality access.";
            err.classList.remove("hidden");
            return;
          }
          window.location.href = "/authority";
        } catch (x) {
          err.textContent = "Network error.";
          err.classList.remove("hidden");
        }
      });
    </script>
  </body>
</html>
