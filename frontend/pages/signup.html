<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sign up — FixCity</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/css/tailwind-overrides.css" />
  </head>
  <body class="min-h-screen bg-slate-50 text-slate-900 antialiased">
    <nav class="sticky top-0 z-50 border-b border-slate-200 bg-white/80 backdrop-blur">
      <div class="mx-auto flex max-w-md items-center justify-between gap-4 px-4 py-3">
        <a href="/" class="flex items-center gap-2">
          <span class="inline-flex h-9 w-9 items-center justify-center rounded-xl bg-indigo-600 text-white font-black">F</span>
          <span class="font-extrabold tracking-tight">FixCity</span>
        </a>
        <div id="nav-mount" class="flex flex-wrap items-center gap-3"></div>
      </div>
    </nav>

    <main class="mx-auto max-w-md px-4 py-10">
      <section class="rounded-2xl border border-slate-200 bg-white p-6 shadow-sm">
        <h1 class="text-xl font-extrabold">Create an account</h1>
        <p class="mt-1 text-sm text-slate-600">Name, email, and password are stored securely (hashed).</p>

        <div id="flash" role="status" aria-live="polite" hidden></div>

        <form id="signup-form" class="mt-6 grid gap-4">
          <label class="block">
            <span class="text-sm font-semibold text-slate-800">Full name</span>
            <input
              type="text"
              name="display_name"
              required
              maxlength="120"
              autocomplete="name"
              class="mt-2 w-full rounded-2xl border border-slate-200 bg-white px-4 py-3 text-sm focus:outline-none focus:ring-4 focus:ring-indigo-100"
            />
          </label>

          <label class="block">
            <span class="text-sm font-semibold text-slate-800">Email</span>
            <input
              type="email"
              name="email"
              required
              maxlength="255"
              autocomplete="email"
              class="mt-2 w-full rounded-2xl border border-slate-200 bg-white px-4 py-3 text-sm focus:outline-none focus:ring-4 focus:ring-indigo-100"
            />
          </label>

          <label class="block">
            <span class="text-sm font-semibold text-slate-800">Password</span>
            <input
              type="password"
              name="password"
              required
              minlength="6"
              autocomplete="new-password"
              class="mt-2 w-full rounded-2xl border border-slate-200 bg-white px-4 py-3 text-sm focus:outline-none focus:ring-4 focus:ring-indigo-100"
            />
          </label>

          <button
            type="submit"
            class="mt-2 inline-flex items-center justify-center rounded-2xl bg-indigo-600 px-5 py-3 text-sm font-semibold text-white shadow hover:bg-indigo-700"
          >
            Sign up
          </button>
        </form>

        <p class="mt-5 text-sm text-slate-600">
          Already have an account?
          <a class="font-semibold text-indigo-700 hover:underline" href="/login">Log in</a>
        </p>
      </section>
    </main>

    <script src="/js/nav.js" defer></script>
    <script>
      (function () {
        var form = document.getElementById("signup-form");
        var flash = document.getElementById("flash");

        function show(msg, ok) {
          flash.hidden = false;
          flash.textContent = msg;
          flash.className =
            "mt-4 rounded-2xl border px-4 py-3 text-sm " +
            (ok
              ? "border-emerald-200 bg-emerald-50 text-emerald-900"
              : "border-rose-200 bg-rose-50 text-rose-900");
        }

        form.addEventListener("submit", async function (e) {
          e.preventDefault();
          var fd = new FormData(form);
          var body = {
            display_name: (fd.get("display_name") || "").toString().trim(),
            email: (fd.get("email") || "").toString().trim(),
            password: (fd.get("password") || "").toString(),
          };
          try {
            var res = await fetch("/api/auth/signup", {
              method: "POST",
              credentials: "same-origin",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(body),
            });
            var data = await res.json().catch(function () {
              return {};
            });
            if (!res.ok) {
              show(data.error || "Sign up failed.", false);
              return;
            }
            show("Welcome! Redirecting…", true);
            var url = new URL(window.location.href);
            var rt = url.searchParams.get("return_to");
            if (rt && rt.startsWith("/")) {
              window.location.href = rt;
            } else {
              window.location.href = "/profile";
            }
          } catch (err) {
            show("Network error. Is the server running?", false);
          }
        });
      })();
    </script>
  </body>
</html>
